name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build
        env:
          # Minimal env for build to pass (dev mode uses fallback defaults)
          NODE_ENV: production

      - name: Unit tests
        run: npm test
