name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build
        env:
          # Minimal env for build to pass (dev mode uses fallback defaults)
          NODE_ENV: production

      - name: Unit tests
        run: npm test

      - name: Migration parity (local list)
        run: npm run check:migrations

      - name: Security audit
        run: npm run audit:security

      - name: Cron route inventory
        run: npx tsx -e "import { CRON_ROUTES } from './src/lib/cron/routes.ts'; if (CRON_ROUTES.length < 7) { console.error('too few routes'); process.exit(1); } console.log('CRON_ROUTES', CRON_ROUTES.length);"
